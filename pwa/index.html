<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/app.css?v=3">
  <title>SigeDash</title>
</head>
<body>

<!-- LOGIN -->
<section id="tela-login">
  <div class="login-logo-area">
    <img src="logo-sigedash.png" alt="SigeDash" class="login-logo">
  </div>
  <div class="login-card">
    <div class="login-form">
      <label for="in-cliente">Empresa</label>
      <select id="in-cliente" autocomplete="organization" disabled>
        <option value="" disabled selected>Carregando empresas…</option>
      </select>
      <label for="in-login">Usuário</label>
      <input id="in-login" type="text" placeholder="Login" autocomplete="username" inputmode="text">
      <label for="in-senha">Senha</label>
      <div class="input-wrap">
        <input id="in-senha" type="password" placeholder="Senha" autocomplete="current-password">
        <button type="button" id="btn-ver-senha" aria-label="Mostrar senha">
          <svg class="ico-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="ico-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none" aria-hidden="true">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <button id="btn-entrar" type="button">Entrar</button>
      <p id="login-erro" class="erro" role="alert" aria-live="polite"></p>
    </div>
  </div>
  <p class="login-versao">SigeDash v2 · SistemasBr</p>
</section>

<!-- APP SHELL -->
<div id="app" hidden>

  <header id="topbar">
    <div class="topbar-start">
      <div class="topbar-brand-ico" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </div>
    </div>
    <div class="topbar-center">
      <span id="topo-titulo">SigeDash</span>
      <span id="topo-cliente"></span>
    </div>
    <div class="topbar-end">
      <button id="btn-atualizar" aria-label="Atualizar dados">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button id="btn-sair" aria-label="Sair">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="conteudo">
    <section id="sec-resumo"     class="sec ativa"  aria-label="Resumo"></section>
    <section id="sec-vendas"     class="sec"        aria-label="Vendas"></section>
    <section id="sec-estoque"    class="sec"        aria-label="Estoque"></section>
    <section id="sec-financeiro" class="sec"        aria-label="Financeiro"></section>
  </main>

  <!-- FAB Assistente IA -->
  <button id="btn-ia" aria-label="Assistente IA">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    </svg>
  </button>

  <!-- Overlay Assistente IA -->
  <div id="overlay-ia" hidden aria-modal="true" role="dialog" aria-label="Assistente IA">
    <div class="ia-header">
      <div class="ia-header-brand">
        <div class="ia-header-ico" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          </svg>
        </div>
        <div>
          <div class="ia-header-titulo">Assistente SigeDash</div>
          <div class="ia-header-sub">Pergunte sobre seus indicadores</div>
        </div>
      </div>
      <button id="btn-fechar-ia" aria-label="Fechar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="ia-msgs" class="ia-msgs" aria-live="polite">
      <div class="ia-msg ia">
        Olá! Posso responder perguntas sobre os indicadores do seu painel. O que gostaria de saber?
      </div>
      <div class="ia-chips" id="ia-sugestoes">
        <button class="ia-chip">Qual foi a venda de hoje?</button>
        <button class="ia-chip">Melhores clientes do mês</button>
        <button class="ia-chip">Como está a inadimplência?</button>
        <button class="ia-chip">Saldo bancário atual</button>
      </div>
    </div>
    <div class="ia-input-wrap">
      <input id="ia-input" class="ia-input" type="text" placeholder="Faça uma pergunta…" autocomplete="off">
      <button id="ia-send" class="ia-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav id="nav-bottom" aria-label="Navegação principal">
    <button class="nav-btn ativo" data-sec="resumo" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Resumo</span>
    </button>
    <button class="nav-btn" data-sec="vendas" aria-current="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Vendas</span>
    </button>
    <button class="nav-btn" data-sec="estoque" aria-current="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      <span>Estoque</span>
    </button>
    <button class="nav-btn" data-sec="financeiro" aria-current="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      <span>Financeiro</span>
    </button>
  </nav>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/api.js?v=3"></script>
<script src="js/render.js?v=3"></script>
<script src="js/app.js?v=3"></script>
<script>
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('service-worker.js');
</script>
</body>
</html>
