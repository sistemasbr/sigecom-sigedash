name: Build e Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extrair versao da tag
        id: versao
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $versao = $tag.TrimStart("v")
          echo "VERSAO=$versao" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"       >> $env:GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build e publish backend (win-x64 self-contained)
        shell: pwsh
        run: |
          .\build-deploy.ps1 -Versao "${{ steps.versao.outputs.VERSAO }}" -PularAgente

      - name: Upload ZIP como Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SigeDash ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/SigeDash-Deploy-v${{ steps.versao.outputs.VERSAO }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
